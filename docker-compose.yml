services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cashflow
      POSTGRES_PASSWORD: cashflow
      POSTGRES_DB: cashflow_risk
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cashflow -d cashflow_risk"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: development
      DATABASE_URL: postgresql+psycopg://cashflow:cashflow@db:5432/cashflow_risk
      SECRET_KEY: ${SECRET_KEY:-dev-docker-secret-change-me}
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && gunicorn --bind 0.0.0.0:5000 --workers 2 run:app"

volumes:
  pgdata:
